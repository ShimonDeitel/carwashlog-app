name: CarWashLog
options:
  bundleIdPrefix: com.shimondeitel.carwashlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  CarWashLog:
    type: application
    platform: iOS
    sources:
      - path: CarWashLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.carwashlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: CarWashLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  CarWashLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CarWashLogTests
      - path: CarWashLog.storekit
    dependencies:
      - target: CarWashLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.carwashlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  CarWashLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CarWashLogUITests
    dependencies:
      - target: CarWashLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.carwashlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  CarWashLog:
    build:
      targets:
        CarWashLog: all
        CarWashLogTests: [test]
        CarWashLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: CarWashLog.storekit
    test:
      config: Debug
      storeKitConfiguration: CarWashLog.storekit
      targets:
        - CarWashLogTests
        - CarWashLogUITests
    archive:
      config: Release
